name: Bug Report
description: Report a problem with HA Auto Updater
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so the issue can be reproduced and fixed quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched the existing issues and this has not already been reported.
          required: true
        - label: I am running the latest released version of HA Auto Updater.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the problem is.
      placeholder: When I... the integration does... but I expected...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can this be reproduced?
      placeholder: |
        1. Go to '...'
        2. Toggle '...'
        3. Run updates
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Settings → About (e.g. 2026.6.1)
      placeholder: "2026.6.1"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: HA Auto Updater version
      description: Shown in HACS or in the integration's manifest (e.g. 1.1.0)
      placeholder: "1.1.0"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual (copied to custom_components)
        - Other
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: Home Assistant installation type
      description: From Settings → System → Repairs → (three dots) → System information
      options:
        - Home Assistant OS
        - Home Assistant Supervised
        - Home Assistant Container
        - Home Assistant Core
        - Not sure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Enable Debug Logging on the device page, reproduce the issue, then paste the relevant lines from Settings → System → Logs. This is automatically formatted as code, so no backticks needed.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, dashboard YAML, or anything else that might help.
