name: Feature Request
description: Suggest a new feature or improvement for HA Auto Updater
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! Please describe what you'd like and why it would be useful.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched the existing issues and this has not already been requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. Focus on the goal, not just the solution.
      placeholder: I want to... because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've tried or thought about.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples from other integrations, or anything else that helps.
